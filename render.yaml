# Render.com Blueprint - LondonSnaps Backend
# Deploy: Connect GitHub repo → Render auto-detects this file
# Free tier: 750 hours/month, auto-sleep after 15 min inactivity

services:
  # Backend API (Node.js + Express + Socket.IO)
  - type: web
    name: londonsnaps-api
    runtime: node
    plan: free
    buildCommand: |
      cd backend && npm ci && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Database (Supabase PostgreSQL / Neon)
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      # Redis (Upstash)
      - key: REDIS_URL
        sync: false
      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      # Supabase Storage
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: media
      # Firebase FCM
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      # Email
      - key: SMTP_HOST
        value: smtp.sendgrid.net
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        value: LondonSnaps
      # Google/Apple OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      # Mapbox
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      # CORS
      - key: CORS_ORIGINS
        value: https://londonsnaps-admin.vercel.app,https://londonsnaps.app
