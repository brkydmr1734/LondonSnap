name: londonsnaps
description: "LondonSnaps - Camera-first social app for London students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^14.2.0
  
  # Network
  dio: ^5.4.3
  
  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  
  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Camera & Media
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Audio Recording & Playback
  record: ^6.0.0
  just_audio: ^0.9.42

  # Sharing & QR
  share_plus: ^10.0.0
  qr_flutter: ^4.1.0

  # Social Auth
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.2
  crypto: ^3.0.6
  connectivity_plus: ^7.0.0

  # Push Notifications (FCM via AWS SNS)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  video_player: ^2.11.1
  socket_io_client: ^3.1.4

  # WebRTC for Voice/Video Calls
  flutter_webrtc: ^0.12.6
  permission_handler: ^11.3.1
  flutter_callkit_incoming: ^2.0.4+1
  image_gallery_saver: ^2.0.3
  photo_manager: ^3.6.0
  url_launcher: ^6.2.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/welcome_bg.jpg
    - assets/images/app_icon.png
